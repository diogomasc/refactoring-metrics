spring.application.name=tcc-prototipo
server.port=8080

# ── JPA / H2 ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:tccdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# ── Actuator ──────────────────────────────────────────────
# Expõe os endpoints que o Prometheus e o Grafana consomem
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always

# ── Micrometer / Observation API ──────────────────────────
# Habilita tracing via Observation API (já incluso no actuator)
management.observations.http.server.requests.name=http.server.requests

# ── Info no /actuator/info ────────────────────────────────
management.info.env.enabled=true
info.app.name=TCC Protótipo
info.app.description=Protótipo com débito técnico intencional

# ── Swagger / OpenAPI ─────────────────────────────────────
# UI: http://localhost:8080/swagger-ui.html
# JSON: http://localhost:8080/api-docs
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Exclui endpoints do Actuator da documentação gerada
springdoc.paths-to-exclude=/actuator/**

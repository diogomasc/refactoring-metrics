spring.application.name=tcc-prototipo
server.port=8080

# ── JPA / H2 ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:tccdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialeto explícito — necessário no Hibernate 6+
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: cria o schema no boot, derruba ao encerrar
# Garante estado limpo a cada execução — essencial para reprodutibilidade
spring.jpa.hibernate.ddl-auto=create-drop

# Mostra o SQL gerado no console — útil para evidenciar N+1 no baseline
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Inicializa data.sql APÓS o Hibernate criar as tabelas (ordem correta)
spring.jpa.defer-datasource-initialization=true

# H2 Console — acessível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always

# ── Micrometer / Observation API ──────────────────────────────────────────────
# Habilita @Observed via AOP (requer ObservationConfig + spring-boot-starter-aop)
management.observations.annotations.enabled=true

# Histogramas: Spring Boot 3.x emite summary por padrão (sem buckets).
# percentiles-histogram=true publica _bucket, habilitando histogram_quantile()
# no Prometheus para cálculo de p50/p95/p99.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.order.service=true
management.metrics.distribution.percentiles-histogram.report.service=true
management.metrics.distribution.percentiles-histogram.notification.service=true
management.metrics.distribution.percentiles-histogram.order.controller=true
# SLOs: buckets fixos alinhados aos thresholds do K6 (50ms → 5s)
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,2s,5s

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-exclude=/actuator/**

# ── Info ──────────────────────────────────────────────────────────────────────
management.info.env.enabled=true
info.app.name=TCC Protótipo
info.app.description=Protótipo com débito técnico intencional

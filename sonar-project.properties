# ── Identificação do Projeto ──────────────────────────────────────────────────
sonar.projectKey=tcc-prototipo
sonar.projectName=TCC — Protótipo com Débito Técnico Intencional
sonar.projectVersion=baseline-1.0

# ── Servidor ──────────────────────────────────────────────────────────────────
# Token: gerado via My Account → Security → User Token
# Exportar como variável de ambiente antes de executar:
#   export SONAR_TOKEN=<token>
sonar.host.url=http://localhost:9000

# ── Fontes e Binários ────────────────────────────────────────────────────────
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# ── Cobertura (JaCoCo) ───────────────────────────────────────────────────────
# Requer execução de: ./mvnw clean verify sonar:sonar
# O plugin JaCoCo gera jacoco.xml durante a fase verify
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ── Exclusões ────────────────────────────────────────────────────────────────
# Excluir classes de configuração e bootstrapping da análise de smells
# (code smells intencionais devem estar apenas nas classes de domínio/serviço)
sonar.exclusions=\
  **/TccPrototipoApplication.java,\
  **/OpenApiConfig.java,\
  **/ObservationConfig.java,\
  **/DataSeeder.java

# ── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
